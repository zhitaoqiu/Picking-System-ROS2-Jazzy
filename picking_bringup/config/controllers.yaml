controller_manager:
  ros__parameters:
    update_rate: 250

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ft_sensor_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

    arm_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    admittance_controller:
      type: admittance_controller/AdmittanceController

joint_state_broadcaster:
  ros__parameters:
    use_local_topics: false

ft_sensor_broadcaster:
  ros__parameters:
    sensor_name: tool_fts
    frame_id: panda_link8

arm_velocity_controller:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7

admittance_controller:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7

    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    chainable_command_interfaces:
      - position
      - velocity

    kinematics:
      # Verify plugin_package on your machine. Some setups use kinematics_interface, some expose kinematics_interface_kdl.
      plugin_name: kinematics_interface_kdl/KinematicsInterfaceKDL
      plugin_package: kinematics_interface
      base: panda_link0
      tip: panda_link8
      group_name: panda_arm
      alpha: 0.0005

    ft_sensor:
      name: tool_fts
      frame:
        id: panda_link8
        external: false
      filter_coefficient: 0.02

    control:
      frame:
        id: panda_link8
        external: false

    fixed_world_frame:
      frame:
        id: panda_link0
        external: false

    gravity_compensation:
      frame:
        id: panda_link8
        external: false
      CoG:
        pos: [0.0, 0.0, 0.05]
        force: 0.0

    admittance:
      selected_axes: [true, true, true, false, false, false]
      mass: [4.0, 4.0, 4.0, 1.0, 1.0, 1.0]
      damping_ratio: [2.0, 2.0, 2.0, 1.0, 1.0, 1.0]
      stiffness: [250.0, 250.0, 120.0, 30.0, 30.0, 30.0]
      joint_damping: 5.0
