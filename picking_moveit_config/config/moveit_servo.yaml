servo_node:
  ros__parameters:
    moveit_servo:
      move_group_name: panda_arm
      planning_frame: panda_link0
      ee_frame_name: panda_link8
      robot_link_command_frame: panda_link8

      command_in_type: speed_units
      linear_scale: 0.2
      rotational_scale: 0.4
      joint_scale: 0.5

      publish_period: 0.01
      low_latency_mode: false
      command_out_type: std_msgs/Float64MultiArray
      command_out_topic: /arm_velocity_controller/commands
      publish_joint_positions: false
      publish_joint_velocities: true
      publish_joint_accelerations: false

      joint_topic: /joint_states
      cartesian_command_in_topic: /servo/cartesian_cmd
      pose_command_in_topic: /servo/pose_cmd
      joint_command_in_topic: /servo/joint_cmd
      status_topic: /servo_node/status

      incoming_command_timeout: 0.1
      num_outgoing_halt_msgs_to_publish: 4
      lower_singularity_threshold: 17.0
      hard_stop_singularity_threshold: 30.0
      joint_limit_margin: 0.1

      check_collisions: false
      use_smoothing: true
      smoothing_filter_plugin_name: online_signal_smoothing::ButterworthFilterPlugin
